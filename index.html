<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#011713">
    <title>Emerald King - Tactical Simulation</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{obsidian:{DEFAULT:'#02231c',deep:'#011713',light:'#033826'},neon:{mint:'#00e676',gold:'#FFD700',blue:'#00b0ff'}},fontFamily:{casino:['Arial','Helvetica','sans-serif']},maxWidth:{mobile:'450px'},animation:{'fade-in':'fadeIn 0.2s ease-in','slide-up':'slideUp 0.3s ease-out','pulse-gold':'pulseGold 2s infinite',spin:'spin 1s linear infinite'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},pulseGold:{'0%,100%':{boxShadow:'0 0 5px #FFD700'},'50%':{boxShadow:'0 0 20px #FFD700,0 0 40px #FFD700'}},spin:{'0%':{transform:'rotate(0deg)'},'100%':{transform:'rotate(360deg)'}}}}}}
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="bg-obsidian-deep font-casino antialiased select-none overflow-x-hidden">

<div id="app" class="mx-auto max-w-mobile min-h-screen relative bg-gradient-to-b from-obsidian via-obsidian-DEFAULT to-obsidian-deep shadow-2xl shadow-black/50 overflow-hidden">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 z-40 mx-auto max-w-mobile bg-obsidian-deep/95 backdrop-blur-md border-b border-white/5 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-gradient-to-br from-neon-mint to-emerald-600 rounded-lg flex items-center justify-center shadow-lg shadow-neon-mint/20"><i class="fas fa-crown text-obsidian-deep text-sm"></i></div>
            <span class="text-neon-mint font-bold text-lg tracking-wider">KING</span>
        </div>
        <div id="balance-capsule" class="flex items-center space-x-2 bg-white/5 backdrop-blur-md rounded-full px-3 py-1.5 border border-white/10 cursor-pointer">
            <i id="refresh-icon" class="fas fa-sync-alt text-neon-mint text-xs cursor-pointer hover:animate-spin"></i>
            <div class="flex flex-col items-end"><span class="text-white/50 text-[10px] leading-none">Balance</span><span id="balance-display" class="text-neon-mint font-bold text-sm leading-tight">0.00</span></div>
        </div>
    </header>

    <!-- MAIN VIEWPORT -->
    <main id="app-viewport" class="px-4 pb-24 mt-16 pt-3 min-h-screen">
        <div class="flex items-center justify-center h-64"><i class="fas fa-spinner fa-spin text-neon-mint text-2xl"></i></div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 mx-auto max-w-mobile bg-obsidian-deep/98 backdrop-blur-md border-t border-white/5">
        <div class="flex items-center justify-around py-2 px-1">
            <a href="#home" class="nav-link flex flex-col items-center space-y-0.5 px-3 py-1 text-neon-mint" data-route="home"><i class="fas fa-home text-lg"></i><span class="text-[10px] font-medium">Home</span></a>
            <a href="#offers" class="nav-link flex flex-col items-center space-y-0.5 px-3 py-1 text-white/50" data-route="offers"><i class="fas fa-tag text-lg"></i><span class="text-[10px] font-medium">Offers</span></a>
            <a href="#invite" class="nav-link flex flex-col items-center space-y-0.5 px-3 py-1 text-white/50 relative" data-route="invite"><div class="absolute -top-5 w-10 h-10 bg-gradient-to-br from-neon-mint to-emerald-600 rounded-full flex items-center justify-center shadow-lg shadow-neon-mint/30 border-2 border-obsidian-deep"><i class="fas fa-gift text-obsidian-deep text-sm"></i></div><span class="text-[10px] font-medium mt-2">Invite</span></a>
            <a href="#deposit" class="nav-link flex flex-col items-center space-y-0.5 px-3 py-1 text-white/50" data-route="deposit"><i class="fas fa-plus-circle text-lg"></i><span class="text-[10px] font-medium">Deposit</span></a>
            <a href="#profile" class="nav-link flex flex-col items-center space-y-0.5 px-3 py-1 text-white/50" data-route="profile"><i class="fas fa-user text-lg"></i><span class="text-[10px] font-medium">Profile</span></a>
        </div>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/router.js"></script>
<script src="js/views/home.js"></script>
<script src="js/views/wallet.js"></script>
<script src="js/views/profile.js"></script>
<script src="js/views/report.js"></script>
</body>
</html>
