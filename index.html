<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0C10">
<link rel="manifest" href="manifest.json">
<title>Vega Casino</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html,body { background:#0B0C10; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  ::-webkit-scrollbar { display:none; }

  .app-frame {
    max-width: 450px;
    margin: 0 auto;
    min-height: 100vh;
    background: #0B0C10;
    position: relative;
    overflow-x: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  @media (min-width: 451px) {
    body { background: linear-gradient(135deg,#15171c,#0B0C10); display:flex; align-items:center; justify-content:center; }
    .app-frame { min-height: 90vh; border-radius: 28px; border:1px solid rgba(255,215,0,0.15); overflow:hidden; }
  }

  .glass {
    background: rgba(20,22,28,0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .gold-text { color:#FFD700; }
  .emerald-text { color:#50C878; }
  .gold-glow { box-shadow: 0 0 12px rgba(255,215,0,0.45), 0 0 2px rgba(255,215,0,0.6) inset; }
  .emerald-glow { box-shadow: 0 0 12px rgba(80,200,120,0.45); }
  .gold-grad { background: linear-gradient(135deg,#FFE680 0%, #FFD700 45%, #B8860B 100%); }
  .card-grad { background: linear-gradient(160deg, rgba(255,215,0,0.08), rgba(80,200,120,0.04) 60%, rgba(11,12,16,0) 100%); }

  .nav-item { transition: all .2s ease; color:#6b7280; }
  .nav-item.active { color:#FFD700; }
  .nav-item.active svg { filter: drop-shadow(0 0 6px rgba(255,215,0,0.7)); }
  .nav-item:active { transform: scale(0.9); }

  .tile { transition: transform .15s ease, box-shadow .15s ease; }
  .tile:active { transform: scale(0.96); }

  .page { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .pulse-dot { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .shimmer { position:relative; overflow:hidden; }
  .shimmer::after {
    content:''; position:absolute; top:0; left:-150%; width:100%; height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,215,0,0.18), transparent);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer { to { left:150%; } }

  .scrollbar-x::-webkit-scrollbar { display:none; }

  .toggle-bg { transition: background-color .2s; }
  .toggle-dot { transition: transform .2s; }

  /* View transition fades (used by app.js router) */
  #app { transition: opacity 0.18s ease; opacity: 1; }
  #app.view-fade-out { opacity: 0; }
  #app.view-fade-in { opacity: 1; animation: viewIn 0.22s ease; }
  @keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="text-white">

<div class="app-frame flex flex-col">

  <!-- TOP BAR -->
  <header class="sticky top-0 z-30 glass px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-full gold-grad flex items-center justify-center gold-glow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#0B0C10"/><path d="M2 17L12 22L22 17" stroke="#0B0C10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12L12 17L22 12" stroke="#0B0C10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <p class="text-[10px] text-gray-400 leading-none">Welcome back</p>
        <p class="text-sm font-bold leading-tight">Vega<span class="gold-text">Casino</span></p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div class="glass rounded-full pl-2 pr-3 py-1.5 flex items-center gap-1.5 emerald-glow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="20" height="14" rx="2" stroke="#50C878" stroke-width="2"/>
          <path d="M2 10H22" stroke="#50C878" stroke-width="2"/>
          <circle cx="17" cy="15" r="1.5" fill="#50C878"/>
        </svg>
        <span class="text-sm font-bold emerald-text" data-balance>$0.00</span>
      </div>
      <button class="w-8 h-8 rounded-full glass flex items-center justify-center relative">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="absolute top-0 right-0 w-2 h-2 rounded-full bg-red-500 pulse-dot"></span>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="app" class="flex-1 overflow-y-auto pb-24"></main>

  <!-- BOTTOM NAV -->
  <nav class="sticky bottom-0 z-30 glass px-2 pt-2 pb-3 flex items-center justify-around">
    <a href="#home" class="nav-item flex flex-col items-center gap-1 px-3 py-1 rounded-xl" data-route="home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v10h14V10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-[10px] font-medium">Lobby</span>
    </a>
    <a href="#live-rooms" class="nav-item flex flex-col items-center gap-1 px-3 py-1 rounded-xl" data-route="live-rooms">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="text-[10px] font-medium">Live</span>
    </a>
    <a href="#wallet" class="nav-item flex flex-col items-center gap-1 px-3 py-1 rounded-xl" data-route="wallet">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      <span class="text-[10px] font-medium">Wallet</span>
    </a>
    <a href="#admin" class="nav-item flex flex-col items-center gap-1 px-3 py-1 rounded-xl" data-route="admin">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-[10px] font-medium">Admin</span>
    </a>
  </nav>

</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- Core modules (loaded in dependency order) -->
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="payment-gateway.js"></script>
<script src="app.js"></script>

</body>
</html>
