<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0806">
    <title>Emerald King Casino</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Header -->
        <header>
            <div class="header-inner">
                <div class="brand">
                    <span class="brand-icon">👑</span>
                    <span class="brand-name">EMERALD KING</span>
                </div>
                <div id="balance-capsule">
                    <span class="balance-label">💰</span>
                    <span class="balance-amount" id="balance-display">₹1,250.00</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Home View -->
            <div id="home-view" class="hash-view">
                <!-- Carousel -->
                <section class="carousel-container">
                    <div class="carousel-track" id="carousel-track">
                        <div class="carousel-slide">
                            <div class="promo-content">
                                <span class="promo-badge">⚡ WELCOME BONUS</span>
                                <h2 class="promo-title">200% Deposit Match</h2>
                                <p class="promo-desc">Up to ₹1,000 + 50 Free Spins</p>
                            </div>
                        </div>
                        <div class="carousel-slide">
                            <div class="promo-content">
                                <span class="promo-badge">🎰 DAILY REWARDS</span>
                                <h2 class="promo-title">10% Cashback</h2>
                                <p class="promo-desc">Unlimited rebate on all games</p>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-dots">
                        <span class="carousel-dot active" data-index="0"></span>
                        <span class="carousel-dot" data-index="1"></span>
                    </div>
                </section>

                <!-- Provider Tabs -->
                <section class="provider-tabs">
                    <button class="provider-btn active" data-provider="all">🔥 All</button>
                    <button class="provider-btn" data-provider="pg">PG Soft</button>
                    <button class="provider-btn" data-provider="pp">PP</button>
                    <button class="provider-btn" data-provider="jdb">JDB</button>
                    <button class="provider-btn" data-provider="spribe">Spribe</button>
                </section>

                <!-- Games Grid -->
                <section class="games-section">
                    <div class="games-header">
                        <h3>🎮 Featured Games</h3>
                        <span id="game-count">24 Games</span>
                    </div>
                    <div class="games-grid" id="games-grid"></div>
                </section>
            </div>

            <!-- Other Views -->
            <div id="offers-view" class="hash-view hidden">Offers Coming Soon</div>
            <div id="invite-view" class="hash-view hidden">Invite Friends</div>
            <div id="deposit-view" class="hash-view hidden">Deposit Funds</div>
            <div id="profile-view" class="hash-view hidden">Profile</div>
        </main>

        <!-- Bottom Navigation -->
        <nav>
            <a href="#home" class="nav-link active" data-route="home">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="#offers" class="nav-link" data-route="offers">
                <span class="nav-icon">🎁</span>
                <span>Offers</span>
            </a>
            <a href="#invite" class="nav-link" data-route="invite">
                <span class="nav-icon">👥</span>
                <span>Invite</span>
                <span class="nav-badge">NEW</span>
            </a>
            <a href="#deposit" class="nav-link" data-route="deposit">
                <span class="nav-icon">💰</span>
                <span>Deposit</span>
            </a>
            <a href="#profile" class="nav-link" data-route="profile">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
